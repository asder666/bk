<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BK Калькулятор ЗП</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #d4600a;
    --accent2: #f5a623;
    --green: #4caf7d;
    --text: #e8e8e8;
    --muted: #666;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  /* ADD SHIFT FORM */
  .form-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-group label {
    font-size: 0.7rem;
    color: var(--muted);
  }

  input[type="date"],
  input[type="time"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="date"]:focus,
  input[type="time"]:focus {
    border-color: var(--accent);
  }

  .btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-danger {
    background: transparent;
    color: #e05555;
    border: 1px solid #e05555;
    padding: 4px 10px;
    font-size: 0.75rem;
    border-radius: 4px;
  }

  /* SHIFTS LIST */
  .shift-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 6px;
    border-left: 3px solid var(--accent);
  }

  .shift-info { flex: 1; }

  .shift-date {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .shift-time {
    font-size: 0.95rem;
    font-weight: 600;
  }

  .shift-meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .shift-pay {
    text-align: right;
    margin-left: 12px;
  }

  .shift-pay .amount {
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
  }

  .shift-pay .hours {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .burger-tag {
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 6px;
  }

  /* WEEK CALENDAR */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .week-label {
    font-size: 0.9rem;
    font-weight: 600;
  }

  .btn-nav {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: border-color 0.15s;
  }

  .btn-nav:hover { border-color: var(--accent); }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day-cell {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    min-height: 80px;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }

  .day-cell.has-shift {
    border-color: var(--accent);
  }

  .day-cell.today {
    border-color: var(--accent2);
  }

  .day-name {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .day-num {
    font-size: 1rem;
    font-weight: 700;
    margin: 2px 0 4px;
  }

  .day-pay {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--green);
  }

  .day-hours {
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* TOTALS */
  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  .total-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .total-box .val {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--green);
  }

  .total-box .lbl {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .week-total-bar {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--accent);
  }

  .week-total-bar .lbl { font-size: 0.8rem; color: var(--muted); }
  .week-total-bar .val { font-size: 1.2rem; font-weight: 800; color: var(--green); }

  /* MONTH */
  .month-week {
    margin-bottom: 12px;
  }

  .month-week-header {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    padding-left: 4px;
  }

  /* ALL TIME */
  .alltime-big {
    text-align: center;
    padding: 24px 0 16px;
  }

  .alltime-big .val {
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--green);
    line-height: 1;
  }

  .alltime-big .lbl {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .rate-info {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 8px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }
</style>
</head>
<body>

<h1>🍔 BK Калькулятор ЗП</h1>
<p class="subtitle">Ставка: 240 руб/ч</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('week')">Неделя</button>
  <button class="tab" onclick="switchTab('month')">Месяц</button>
  <button class="tab" onclick="switchTab('alltime')">Всё время</button>
  <button class="tab" onclick="switchTab('add')">+ Смена</button>
</div>

<!-- ADD SHIFT -->
<div id="tab-add" class="tab-content">
  <div class="card">
    <div class="card-title">Добавить смену</div>
    <div class="form-row">
      <div class="form-group">
        <label>Дата</label>
        <input type="date" id="inp-date">
      </div>
      <div class="form-group">
        <label>Начало</label>
        <input type="time" id="inp-start">
      </div>
      <div class="form-group">
        <label>Конец</label>
        <input type="time" id="inp-end">
      </div>
      <button class="btn btn-primary" onclick="addShift()">Добавить</button>
    </div>
    <div id="add-preview" style="font-size:0.8rem; color: var(--muted);"></div>
  </div>

  <div class="card">
    <div class="card-title">Все смены</div>
    <div id="all-shifts-list"></div>
  </div>
</div>

<!-- WEEK -->
<div id="tab-week" class="tab-content active">
  <div class="week-nav">
    <button class="btn-nav" onclick="changeWeek(-1)">← Пред</button>
    <span class="week-label" id="week-label"></span>
    <button class="btn-nav" onclick="changeWeek(1)">След →</button>
  </div>
  <div class="week-grid" id="week-grid"></div>
  <div class="week-total-bar">
    <span class="lbl">Итого за неделю</span>
    <span class="val" id="week-total">0 ₽</span>
  </div>
  <div class="totals-grid">
    <div class="total-box">
      <div class="val" id="week-hours">0ч</div>
      <div class="lbl">Оплачиваемых часов</div>
    </div>
    <div class="total-box">
      <div class="val" id="week-burgers">0 🍔</div>
      <div class="lbl">Бесплатных обедов</div>
    </div>
  </div>
</div>

<!-- MONTH -->
<div id="tab-month" class="tab-content">
  <div class="week-nav">
    <button class="btn-nav" onclick="changeMonth(-1)">← Пред</button>
    <span class="week-label" id="month-label"></span>
    <button class="btn-nav" onclick="changeMonth(1)">След →</button>
  </div>
  <div id="month-content"></div>
</div>

<!-- ALL TIME -->
<div id="tab-alltime" class="tab-content">
  <div class="card">
    <div class="alltime-big">
      <div class="val" id="alltime-total">0 ₽</div>
      <div class="lbl">Заработано всего</div>
    </div>
    <div class="divider"></div>
    <div class="totals-grid">
      <div class="total-box">
        <div class="val" id="alltime-shifts">0</div>
        <div class="lbl">Смен отработано</div>
      </div>
      <div class="total-box">
        <div class="val" id="alltime-hours">0ч</div>
        <div class="lbl">Оплачиваемых часов</div>
      </div>
      <div class="total-box">
        <div class="val" id="alltime-burgers">0 🍔</div>
        <div class="lbl">Бесплатных обедов</div>
      </div>
      <div class="total-box">
        <div class="val" id="alltime-avg">0 ₽</div>
        <div class="lbl">Средняя смена</div>
      </div>
    </div>
  </div>
</div>

<script>
const RATE = 240;
const DAYS_RU = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let shifts = JSON.parse(localStorage.getItem('bk_shifts') || '[]');
let currentWeekOffset = 0;
let currentMonthOffset = 0;

function saveShifts() {
  localStorage.setItem('bk_shifts', JSON.stringify(shifts));
}

// Логика расчёта смены
function calcShift(startTime, endTime) {
  const [sh, sm] = startTime.split(':').map(Number);
  const [eh, em] = endTime.split(':').map(Number);
  let totalMins = (eh * 60 + em) - (sh * 60 + sm);
  if (totalMins < 0) totalMins += 24 * 60; // переход через полночь

  let deductMins = 0;
  let bonusMins = 0;
  let lunches = 0;

  // Пороги в минутах
  if (totalMins >= 10 * 60 + 30) {       // ≥ 10ч 30м
    deductMins = 30;
    bonusMins = 30;
    lunches = 2;
  } else if (totalMins >= 8 * 60 + 30) { // ≥ 8ч 30м
    deductMins = 30;
    bonusMins = 15;
    lunches = 1;
  } else if (totalMins >= 4 * 60 + 30) { // ≥ 4ч 30м
    deductMins = 30;
    bonusMins = 0;
    lunches = 1;
  } else if (totalMins >= 2 * 60 + 15) { // ≥ 2ч 15м
    deductMins = 15;
    bonusMins = 0;
    lunches = 0;
  }

  const paidMins = totalMins - deductMins + bonusMins;
  const pay = Math.round((paidMins / 60) * RATE);

  return {
    totalMins,
    paidMins,
    deductMins,
    bonusMins,
    lunches,
    pay,
    paidHours: (paidMins / 60).toFixed(2)
  };
}

function formatMins(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m > 0 ? `${h}ч ${m}м` : `${h}ч`;
}

function addShift() {
  const date = document.getElementById('inp-date').value;
  const start = document.getElementById('inp-start').value;
  const end = document.getElementById('inp-end').value;
  if (!date || !start || !end) return alert('Заполни все поля!');

  const calc = calcShift(start, end);
  shifts.push({ date, start, end, ...calc });
  shifts.sort((a, b) => a.date.localeCompare(b.date));
  saveShifts();
  renderAll();
  document.getElementById('add-preview').textContent = '';
}

function deleteShift(idx) {
  if (!confirm('Удалить смену?')) return;
  shifts.splice(idx, 1);
  saveShifts();
  renderAll();
}

// Preview при вводе
['inp-start','inp-end','inp-date'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    const s = document.getElementById('inp-start').value;
    const e = document.getElementById('inp-end').value;
    if (s && e) {
      const c = calcShift(s, e);
      document.getElementById('add-preview').textContent =
        `→ ${formatMins(c.totalMins)} | Оплач: ${formatMins(c.paidMins)} | ${c.pay} ₽ | 🍔 ${c.lunches}`;
    }
  });
});

function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay(); // 0=вс
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  renderWeek();
}

function changeMonth(dir) {
  currentMonthOffset += dir;
  renderMonth();
}

function dateKey(d) {
  return d.toISOString().slice(0,10);
}

function renderWeek() {
  const weekStart = getWeekStart(currentWeekOffset);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);

  const startStr = weekStart.toLocaleDateString('ru', { day:'numeric', month:'short' });
  const endStr = weekEnd.toLocaleDateString('ru', { day:'numeric', month:'short' });
  document.getElementById('week-label').textContent = `${startStr} — ${endStr}`;

  const today = dateKey(new Date());
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  let weekPay = 0, weekPaidMins = 0, weekLunches = 0;

  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const key = dateKey(d);
    const dayShifts = shifts.filter(s => s.date === key);

    const dayPay = dayShifts.reduce((s, x) => s + x.pay, 0);
    const dayMins = dayShifts.reduce((s, x) => s + x.paidMins, 0);
    const dayLunches = dayShifts.reduce((s, x) => s + x.lunches, 0);

    weekPay += dayPay;
    weekPaidMins += dayMins;
    weekLunches += dayLunches;

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (dayShifts.length ? ' has-shift' : '') + (key === today ? ' today' : '');
    cell.innerHTML = `
      <div class="day-name">${DAYS_RU[(d.getDay())]}</div>
      <div class="day-num">${d.getDate()}</div>
      ${dayShifts.length ? `
        <div class="day-pay">${dayPay} ₽</div>
        <div class="day-hours">${formatMins(dayMins)}</div>
        ${dayLunches ? `<div style="font-size:0.65rem;margin-top:2px">🍔${dayLunches}</div>` : ''}
      ` : `<div class="day-hours" style="margin-top:8px">—</div>`}
    `;
    grid.appendChild(cell);
  }

  document.getElementById('week-total').textContent = weekPay.toLocaleString('ru') + ' ₽';
  document.getElementById('week-hours').textContent = formatMins(weekPaidMins);
  document.getElementById('week-burgers').textContent = weekLunches + ' 🍔';
}

function renderMonth() {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  document.getElementById('month-label').textContent = `${MONTHS_RU[target.getMonth()]} ${target.getFullYear()}`;

  const monthShifts = shifts.filter(s => {
    const d = new Date(s.date);
    return d.getFullYear() === target.getFullYear() && d.getMonth() === target.getMonth();
  });

  const container = document.getElementById('month-content');

  if (!monthShifts.length) {
    container.innerHTML = '<div class="empty-state">Нет смен в этом месяце</div>';
    return;
  }

  // Группируем по неделям
  const weeks = {};
  monthShifts.forEach(s => {
    const d = new Date(s.date);
    const day = d.getDay();
    const mon = new Date(d);
    mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    const wk = dateKey(mon);
    if (!weeks[wk]) weeks[wk] = [];
    weeks[wk].push(s);
  });

  let monthTotal = 0;
  let monthMins = 0;
  let html = '';

  Object.keys(weeks).sort().forEach(wk => {
    const wShifts = weeks[wk];
    const wPay = wShifts.reduce((s,x) => s+x.pay, 0);
    const wMins = wShifts.reduce((s,x) => s+x.paidMins, 0);
    monthTotal += wPay;
    monthMins += wMins;

    const wStart = new Date(wk);
    const wEnd = new Date(wk);
    wEnd.setDate(wStart.getDate() + 6);
    const label = `${wStart.toLocaleDateString('ru',{day:'numeric',month:'short'})} — ${wEnd.toLocaleDateString('ru',{day:'numeric',month:'short'})}`;

    html += `<div class="month-week">
      <div class="month-week-header">${label} · ${wPay.toLocaleString('ru')} ₽ · ${formatMins(wMins)}</div>`;

    wShifts.forEach(s => {
      const d = new Date(s.date);
      html += `<div class="shift-item">
        <div class="shift-info">
          <div class="shift-date">${DAYS_RU[d.getDay()]}, ${d.toLocaleDateString('ru',{day:'numeric',month:'short'})}</div>
          <div class="shift-time">${s.start} — ${s.end}</div>
          <div class="shift-meta">${formatMins(s.totalMins)} факт · оплач ${formatMins(s.paidMins)}${s.lunches ? ` · 🍔${s.lunches}` : ''}</div>
        </div>
        <div class="shift-pay">
          <div class="amount">${s.pay.toLocaleString('ru')} ₽</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  html += `<div class="week-total-bar">
    <span class="lbl">Итого за месяц</span>
    <span class="val">${monthTotal.toLocaleString('ru')} ₽</span>
  </div>`;

  container.innerHTML = html;
}

function renderAllShifts() {
  const container = document.getElementById('all-shifts-list');
  if (!shifts.length) {
    container.innerHTML = '<div class="empty-state">Смен пока нет. Добавь первую!</div>';
    return;
  }

  container.innerHTML = [...shifts].reverse().map((s, ri) => {
    const idx = shifts.length - 1 - ri;
    const d = new Date(s.date);
    return `<div class="shift-item">
      <div class="shift-info">
        <div class="shift-date">${DAYS_RU[d.getDay()]}, ${d.toLocaleDateString('ru',{day:'numeric',month:'long'})}</div>
        <div class="shift-time">${s.start} — ${s.end}</div>
        <div class="shift-meta">${formatMins(s.totalMins)} факт · оплач ${formatMins(s.paidMins)}${s.lunches ? ` · 🍔${s.lunches}` : ''}</div>
      </div>
      <div class="shift-pay">
        <div class="amount">${s.pay.toLocaleString('ru')} ₽</div>
        <button class="btn btn-danger" onclick="deleteShift(${idx})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderAllTime() {
  if (!shifts.length) {
    document.getElementById('alltime-total').textContent = '0 ₽';
    document.getElementById('alltime-shifts').textContent = '0';
    document.getElementById('alltime-hours').textContent = '0ч';
    document.getElementById('alltime-burgers').textContent = '0 🍔';
    document.getElementById('alltime-avg').textContent = '0 ₽';
    return;
  }

  const total = shifts.reduce((s,x) => s+x.pay, 0);
  const totalMins = shifts.reduce((s,x) => s+x.paidMins, 0);
  const totalLunches = shifts.reduce((s,x) => s+x.lunches, 0);
  const avg = Math.round(total / shifts.length);

  document.getElementById('alltime-total').textContent = total.toLocaleString('ru') + ' ₽';
  document.getElementById('alltime-shifts').textContent = shifts.length;
  document.getElementById('alltime-hours').textContent = formatMins(totalMins);
  document.getElementById('alltime-burgers').textContent = totalLunches + ' 🍔';
  document.getElementById('alltime-avg').textContent = avg.toLocaleString('ru') + ' ₽';
}

function renderAll() {
  renderWeek();
  renderMonth();
  renderAllShifts();
  renderAllTime();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['week','month','alltime','add'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// Дефолтная дата — сегодня
document.getElementById('inp-date').value = dateKey(new Date());

renderAll();
</script>
</body>
